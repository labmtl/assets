name: Process Uploaded Media

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'uploads/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  process_media:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai
          sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick libimage-exiftool-perl

      - name: Process new media files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          find uploads -type f | while read file; do
            if [ "$file" = "uploads/.gitkeep" ]; then continue; fi
            echo "Processing $file"
            file_hash=$(md5sum "$file" | awk '{ print $1 }')
            python .github/scripts/process_file.py \
              --input-file "$file" \
              --file-hash "$file_hash" \
              --gemini-api-key "$GEMINI_API_KEY" \
              --github-repository "${{ github.repository }}" \
              --github-ref-for-raw-url "main"
          done

      - name: Generate Manifest
        run: python .github/scripts/generate_manifest.py

      - name: Commit processed files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add processed_media/ processed_flags/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-process media and update manifest"
            git push
          fi
